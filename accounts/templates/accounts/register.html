<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – BRFN</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            color: #333;
            background: #fafaf7;
        }

        header {
            background: #4a7c59;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.2rem;
        }

        header nav a {
            color: white;
            margin-left: 1rem;
            text-decoration: none;
        }

        .page {
            padding: 3rem 1rem;
            max-width: 400px;
            margin: 0 auto;
        }

        h2 {
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }

        input,
        select {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95rem;
        }

        button {
            width: 100%;
            padding: 0.6rem;
            background: #4a7c59;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .error {
            color: red;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .link {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #666;
        }

        .link a {
            color: #4a7c59;
        }

        footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.85rem;
            color: #999;
            border-top: 1px solid #eee;
            margin-top: 3rem;
        }
    </style>
</head>

<body>
    <header>
        <h1><a href="/" style="color:white;text-decoration:none;">Bristol Regional Food Network</a></h1>
        <nav>
            <a href="/browse/">Browse</a>
            <a href="/browse/producers/">Producers</a>
            <a href="/accounts/login/">Log In</a>
        </nav>
    </header>
    <div class="page">
        <h2>Create Account</h2>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
            </div>
            <div class="form-group">
                <label for="role">I am a...</label>
                <select id="role" name="role">
                    <option value="customer">Customer</option>
                    <option value="producer">Producer</option>
                    <option value="community_group">Community Group</option>
                    <option value="restaurant">Restaurant / Café</option>
                </select>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Register</button>
        </form>
        <p class="link">Already have an account? <a href="/accounts/login/">Log In</a></p>
    </div>
    <footer>&copy; 2026 Bristol Regional Food Network</footer>
</body>

</html>
