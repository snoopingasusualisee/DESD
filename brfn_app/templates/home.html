<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bristol Regional Food Network</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
        }

        header {
            background: #4a7c59;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.2rem;
        }

        header nav a {
            color: white;
            margin-left: 1rem;
            text-decoration: none;
        }

        .hero {
            text-align: center;
            padding: 3rem 1rem;
            background: #f4f9f4;
        }

        .hero h2 {
            margin-bottom: 0.5rem;
        }

        .hero p {
            color: #666;
            max-width: 500px;
            margin: 0 auto 1.5rem;
        }

        .hero a {
            padding: 0.6rem 1.5rem;
            background: #4a7c59;
            color: white;
            border-radius: 4px;
            text-decoration: none;
        }

        footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.85rem;
            color: #999;
            border-top: 1px solid #eee;
        }
    </style>
</head>

<body>

    <header>
        <h1>Bristol Regional Food Network</h1>
        <nav>
            <a href="/browse/">Browse</a>
            <a href="/browse/producers/">Producers</a>
            <a href="/accounts/login/">Log In</a>
        </nav>
    </header>

    <div class="hero">
        <h2>Fresh Local Produce</h2>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
        <a href="#">Browse Produce</a>
    </div>

    <footer>
        &copy; 2026 Bristol Regional Food Network
    </footer>

</body>

</html>
