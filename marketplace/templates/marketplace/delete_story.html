{% extends "base.html" %}
{% load static %}
{% block title %}Delete Story – BRFN{% endblock %}
{% block content %}
    <div class="page">
        <h2>Delete Farm Story</h2>
        <p>Are you sure you want to delete this farm story?</p>
        <div style="background: #f8f9fa; padding: 1rem; border-radius: 4px; margin: 2rem 0;">
            <h3 style="margin-top: 0;">{{ story.title }}</h3>
            <p style="color: #666;">{{ story.content|truncatewords:30 }}</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn-delete">Yes, Delete Story</button>
            <a href="/browse/my-stories/" class="btn-secondary">Cancel</a>
        </form>
    </div>
{% endblock %}
