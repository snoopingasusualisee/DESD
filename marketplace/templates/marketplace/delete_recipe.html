{% extends "base.html" %}
{% load static %}
{% block title %}Delete Recipe – BRFN{% endblock %}
{% block content %}
    <div class="page">
        <h2>Delete Recipe</h2>
        <p>Are you sure you want to delete this recipe?</p>
        <div style="background: #f8f9fa; padding: 1rem; border-radius: 4px; margin: 2rem 0;">
            <h3 style="margin-top: 0;">{{ recipe.title }}</h3>
            <p style="color: #666;">{{ recipe.seasonal_tag|title }}</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn-delete">Yes, Delete Recipe</button>
            <a href="/browse/my-recipes/" class="btn-secondary">Cancel</a>
        </form>
    </div>
{% endblock %}
