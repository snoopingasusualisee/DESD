{% extends "base.html" %}
{% load static %}
{% block title %}Log In – BRFN{% endblock %}
{% block content %}
    <div class="page">
        <h2>Log In</h2>
        {% if form.errors %}
            <p class="error">Invalid username or password.</p>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
            <button type="submit">Log In</button>
        </form>
        <p class="link">Don't have an account? <a href="/accounts/register/">Register</a></p>
    </div>
{% endblock %}
