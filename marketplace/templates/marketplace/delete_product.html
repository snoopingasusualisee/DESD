{% extends "base.html" %}
{% load static %}
{% block title %}Delete {{ product.name }} – BRFN{% endblock %}
{% block content %}
    <div class="page">
        <h2>Delete Product</h2>
        <p>Are you sure you want to delete <strong>"{{ product.name }}"</strong>? This action cannot be undone.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" style="background: #c00;">Yes, Delete</button>
        </form>
        <p class="link"><a href="/browse/product/{{ product.id }}/">← Cancel</a></p>
    </div>
{% endblock %}
