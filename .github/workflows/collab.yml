name: Collab — Build, Validate & Merge to Main

on:
  push:
    branches: ['**']

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: brfn_db
          MYSQL_USER: brfn_user
          MYSQL_PASSWORD: brfn_pass
          MYSQL_ROOT_PASSWORD: brfn_root_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u brfn_user -pbrfn_pass"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y default-libmysqlclient-dev pkg-config

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django system checks
        env:
          DATABASE_ENGINE: mysql
          DATABASE_NAME: brfn_db
          DATABASE_USER: brfn_user
          DATABASE_PASSWORD: brfn_pass
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: 3306
          DJANGO_SECRET_KEY: ci-test-secret-key
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: python manage.py check

      - name: Run migrations
        env:
          DATABASE_ENGINE: mysql
          DATABASE_NAME: brfn_db
          DATABASE_USER: brfn_user
          DATABASE_PASSWORD: brfn_pass
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: 3306
          DJANGO_SECRET_KEY: ci-test-secret-key
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: python manage.py migrate --noinput

      - name: Build Docker image
        run: docker build -t brfn-app:${{ github.sha }} .

  run-tests:
    runs-on: ubuntu-latest
    needs: build-and-validate

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: brfn_db
          MYSQL_USER: brfn_user
          MYSQL_PASSWORD: brfn_pass
          MYSQL_ROOT_PASSWORD: brfn_root_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u brfn_user -pbrfn_pass"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y default-libmysqlclient-dev pkg-config

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_ENGINE: mysql
          DATABASE_NAME: brfn_db
          DATABASE_USER: brfn_user
          DATABASE_PASSWORD: brfn_pass
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: 3306
          DJANGO_SECRET_KEY: ci-test-secret-key
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: python manage.py migrate --noinput

      - name: Run all test cases
        env:
          DATABASE_ENGINE: mysql
          DATABASE_NAME: brfn_db
          DATABASE_USER: brfn_user
          DATABASE_PASSWORD: brfn_pass
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: 3306
          DJANGO_SECRET_KEY: ci-test-secret-key
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: python manage.py test unit_tests --verbosity=2

  merge-to-main:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: run-tests

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge pushed branch into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SOURCE_BRANCH="${GITHUB_REF#refs/heads/}"

          git fetch origin
          git checkout main
          git pull origin main

          if git merge "origin/$SOURCE_BRANCH" --no-edit; then
            git push origin main
            echo "Successfully merged $SOURCE_BRANCH into main"
          else
            echo "Merge conflict while merging $SOURCE_BRANCH into main"
            git merge --abort
            exit 1
          fi
